name: osolab-authportal-local

services:
  portal:
    image: node:24-slim
    container_name: osolab-authportal
    working_dir: /app
    environment:
      NUXT_PUBLIC_AUTH_API_BASE: "http://localhost:5000"
      NUXT_PUBLIC_AUTH_CLIENT_ID: "00000000000000000000000000000000"
      NUXT_PUBLIC_AUTH_SCOPE: "openid profile email"
      HOST: "0.0.0.0"
      PORT: "5700"
    ports:
      - "5700:5700"
    volumes:
      - .:/app
      - portal-node-modules:/app/node_modules
    command: >
      sh -lc "npm install && npm run dev"

volumes:
  portal-node-modules:
